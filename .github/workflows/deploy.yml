name: Build & Deploy to DreamHost

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DREAMHOST_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.DREAMHOST_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        env:
          DH_USER:   ${{ secrets.DREAMHOST_USER }}
          DH_HOST:   ${{ secrets.DREAMHOST_HOST }}
          DH_PATH:   ${{ secrets.DREAMHOST_PATH }}
        run: |
          # --delete keeps the remote in sync with dist/
          # exclude lines protect things you may have put on the server
          rsync -avz --delete \
            --exclude '.well-known' \
            --exclude 'cgi-bin' \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            ./dist/ "$DH_USER@$DH_HOST:$DH_PATH"

      - name: Done
        run: echo "Deployed $(git rev-parse --short HEAD) to DreamHost."
